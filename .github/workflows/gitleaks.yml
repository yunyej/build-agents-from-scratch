name: gitleaks

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

# gitleaks-action uses the token for PR comments and SARIF / artifact reporting.
# https://github.com/gitleaks/gitleaks-action
permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

